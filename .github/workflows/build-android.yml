name: Build Android APK (Plus enabled)

on:
  workflow_dispatch:
  push:
    branches: [master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK r26d
        run: |
          echo "y" | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "ndk;26.3.11579264"

      - name: Make Gradlew executable
        run: chmod +x dependencies/RSDKv5/android/gradlew

      - name: Build APK with Gradle (Plus enabled)
        working-directory: dependencies/RSDKv5/android
        run: |
          ./gradlew assembleRelease \
            -PRETRO_DISABLE_PLUS=off \
            -PANDROID_NDK_VERSION=26.3.11579264
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/26.3.11579264

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SonicMania-Plus-APK
          path: "dependencies/RSDKv5/android/app/build/outputs/apk/**/*.apk"
          if-no-files-found: warn
          retention-days: 90
